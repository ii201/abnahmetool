<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unterschrift Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            padding: 20px;
            background: #f0f0f0;
        }
        h1 { font-size: 18px; margin-bottom: 20px; }
        .pad-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        canvas {
            border: 2px dashed #999;
            background: #fafafa;
            display: block;
            width: 100%;
            height: 200px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }
        button {
            margin-top: 15px;
            padding: 12px 24px;
            background: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        #status {
            background: #000;
            color: #0f0;
            padding: 10px;
            font-family: monospace;
            font-size: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
            min-height: 100px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Unterschrift Test</h1>
    
    <div id="status">Warte auf Initialisierung...</div>
    
    <div class="pad-container">
        <p style="margin-bottom: 10px;"><strong>Bitte hier mit dem Finger zeichnen:</strong></p>
        <canvas id="pad"></canvas>
        <button onclick="clearPad()">Löschen</button>
        <button onclick="testPad()">Test: Linie zeichnen</button>
    </div>

    <script>
        const status = document.getElementById('status');
        function log(msg) {
            const time = new Date().toLocaleTimeString();
            status.textContent = `[${time}] ${msg}\n` + status.textContent;
        }

        const canvas = document.getElementById('pad');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let lastX = 0, lastY = 0;

        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            const ratio = window.devicePixelRatio || 1;
            canvas.width = rect.width * ratio;
            canvas.height = rect.height * ratio;
            ctx.scale(ratio, ratio);
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#000';
            log(`Canvas Größe: ${rect.width}x${rect.height}, Ratio: ${ratio}`);
        }

        function getXY(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;
            if (e.touches && e.touches[0]) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            return { x, y };
        }

        canvas.addEventListener('touchstart', function(e) {
            e.preventDefault();
            const pos = getXY(e);
            drawing = true;
            lastX = pos.x;
            lastY = pos.y;
            log(`TOUCH START at ${Math.round(pos.x)},${Math.round(pos.y)}`);
        }, { passive: false });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            if (!drawing) return;
            const pos = getXY(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        }, { passive: false });

        canvas.addEventListener('touchend', function(e) {
            e.preventDefault();
            drawing = false;
            log('TOUCH END');
        }, { passive: false });

        // Mouse Events für Desktop
        canvas.addEventListener('mousedown', function(e) {
            const pos = getXY(e);
            drawing = true;
            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('mousemove', function(e) {
            if (!drawing) return;
            const pos = getXY(e);
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            lastX = pos.x;
            lastY = pos.y;
        });

        canvas.addEventListener('mouseup', function() {
            drawing = false;
        });

        canvas.addEventListener('mouseout', function() {
            drawing = false;
        });

        function clearPad() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            log('Pad gelöscht');
        }

        function testPad() {
            ctx.beginPath();
            ctx.moveTo(20, 50);
            ctx.lineTo(200, 100);
            ctx.stroke();
            log('Test-Linie gezeichnet');
        }

        // Initialisierung
        window.addEventListener('load', function() {
            resizeCanvas();
            log('App geladen. Bereit zum Zeichnen.');
            log(`Browser: ${navigator.userAgent.substring(0, 60)}`);
        });
    </script>
</body>
</html>
